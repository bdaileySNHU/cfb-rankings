<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Stat-urday">
  <meta property="og:title" content="Stat-urday — College Football ELO Rankings">
  <meta property="og:description" content="ELO-based college football power ratings updated weekly.">
  <meta property="og:url" content="https://cfb.bdailey.com/">
  <meta property="og:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stat-urday — College Football ELO Rankings">
  <meta name="twitter:description" content="ELO-based college football power ratings updated weekly.">
  <meta name="twitter:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <link rel="canonical" href="https://cfb.bdailey.com/">
  <title>Stat·urday — Power Ratings</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components/board.css">
</head>
<body class="tkr">
  <!-- Ticker header + tape injected by layout.js -->
  <script src="js/layout.js" data-season="false"></script>

  <div class="tkr-wrap">
    <div class="tkr-pagehead">
      <div>
        <h1 class="tkr-title">Power Ratings</h1>
        <p class="tkr-subtitle" id="tkr-subtitle">Elo model · updated after every final</p>
      </div>
      <div class="tkr-ribbon">
        <div class="tkr-tile top-elo"><div class="val" id="rib-topelo">—</div><div class="lbl">Top Elo</div></div>
        <div class="tkr-tile field-avg"><div class="val" id="rib-fieldavg">—</div><div class="lbl">Field Avg</div></div>
        <div class="tkr-tile top-mover"><div class="val" id="rib-mover">—</div><div class="lbl">Top Mover</div></div>
      </div>
    </div>

    <div id="tkr-board">
      <div class="tkr-table" id="tkr-table">
        <div style="padding:24px;color:var(--fg2);font-family:var(--font-mono);font-size:12px;">Loading rankings…</div>
      </div>

      <!-- Game predictions (rendered by board.js; hidden until loaded) -->
      <div class="tkr-preds-card hidden" id="tkr-preds">
        <div class="tkr-preds-head">
          <h2 class="tkr-preds-title">Game Predictions</h2>
          <span class="tkr-preds-meta" id="tkr-preds-meta"></span>
        </div>
        <div id="tkr-preds-body"></div>
      </div>
    </div>

    <!-- Team detail view renders here in place (no route change) -->
    <div id="tkr-detail" class="hidden"></div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
