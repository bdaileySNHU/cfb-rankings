<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Stat-urday">
  <meta property="og:title" content="Game Schedule — Stat-urday">
  <meta property="og:description" content="College football game schedule and results with ELO rating changes.">
  <meta property="og:url" content="https://cfb.bdailey.com/games.html">
  <meta property="og:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Game Schedule — Stat-urday">
  <meta name="twitter:description" content="College football game schedule and results with ELO rating changes.">
  <meta name="twitter:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <!-- Canonical -->
  <link rel="canonical" href="https://cfb.bdailey.com/games.html">
  <title>Games - College Football Rankings</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components/board.css">
  <style>
    /* Game date column styling */
    .game-date {
      white-space: nowrap;
      color: var(--fg2);
      font-size: 0.9em;
    }

    /* Responsive: Hide date column on small mobile devices */
    @media (max-width: 480px) {
      th:nth-child(2),
      td.game-date {
        display: none;
      }
    }

    /* Responsive: Show abbreviated date on medium mobile/tablet */
    @media (min-width: 481px) and (max-width: 768px) {
      .game-date {
        font-size: 0.85em;
      }
    }

    /* Ticker-style table overrides */
    .tkr-table {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--panel);
      margin: 1.5rem 0;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
    }

    .schedule-table th {
      background: var(--panel);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--fg3);
      border-bottom: 1px solid var(--line);
    }

    .schedule-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      font-size: 13px;
    }

    .schedule-table tbody tr {
      transition: background 0.12s ease;
    }

    .schedule-table tbody tr:hover {
      background: var(--panel2);
      cursor: pointer;
    }

    .schedule-table tbody tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body class="tkr">
  <!-- Site chrome (header + nav) injected by layout.js -->
  <script src="js/layout.js"></script>

  <div class="tkr-wrap">
    <div class="tkr-pagehead">
      <div>
        <h1 class="tkr-title">Game Schedule & Results</h1>
        <p class="tkr-subtitle">College football game outcomes and ELO rating changes</p>
      </div>
    </div>

    <div class="tkr-filter-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 0.5rem;">
      <h2 style="font-family: var(--font-sans); font-size: 14.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg); margin: 0;">All Games</h2>
      <div class="filters">
        <select class="filter-select" id="week-filter">
          <option value="">All Weeks</option>
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
          <option value="5">Week 5</option>
        </select>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Loading games...</span>
    </div>

    <div id="games-container" class="hidden">
      <div class="tkr-table">
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Week</th>
              <th>Date</th>
              <th>Winner</th>
              <th>Score</th>
              <th>Loser</th>
              <th>Location</th>
              <th>ELO Change</th>
            </tr>
          </thead>
          <tbody id="games-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 Stat-urday</p>
      <p><a href="elo-formula.html">How It Works</a> | <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/date-utils.js"></script>
  <script src="js/season.js"></script>
  <script>
    let allGames = [];
    let teams = {};

    document.addEventListener('DOMContentLoaded', () => {
      loadGames();
      document.getElementById('week-filter').addEventListener('change', filterGames);
    });

    async function loadGames() {
      try {
        // Fetch active season from API
        const activeSeason = await api.getActiveSeason();

        const [gamesData, teamsData] = await Promise.all([
          api.getGames({ season: activeSeason, limit: 200 }),
          api.getTeams()
        ]);

        allGames = gamesData;

        // Create teams lookup
        teamsData.forEach(t => teams[t.id] = t);

        displayGames(allGames);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('games-container').classList.remove('hidden');
      } catch (err) {
        console.error('Error loading games:', err);
      }
    }

    function filterGames() {
      const week = document.getElementById('week-filter').value;
      const filtered = week ? allGames.filter(g => g.week === parseInt(week)) : allGames;
      displayGames(filtered);
    }

    function displayGames(games) {
      const tbody = document.getElementById('games-tbody');
      tbody.innerHTML = '';

      games.sort((a, b) => b.week - a.week || b.id - a.id).forEach(game => {
        const row = document.createElement('tr');

        // Check if game has been played (scores exist)
        const hasScore = game.home_score !== null && game.away_score !== null;

        if (hasScore) {
          // Completed game - display winner/loser
          const winner = game.home_score > game.away_score ? teams[game.home_team_id] : teams[game.away_team_id];
          const loser = game.home_score > game.away_score ? teams[game.away_team_id] : teams[game.home_team_id];

          // Skip if teams not found
          if (!winner || !loser) return;

          const winnerScore = Math.max(game.home_score, game.away_score);
          const loserScore = Math.min(game.home_score, game.away_score);
          const isHomeWin = game.home_score > game.away_score;
          const location = game.is_neutral_site ? 'Neutral' : (isHomeWin ? 'Home' : 'Away');
          const eloChange = Math.abs(isHomeWin ? game.home_rating_change : game.away_rating_change);

          // Format game date
          const formattedDate = formatGameDate(game.game_date);
          const fullDateTime = getFullDateTime(game.game_date);

          row.innerHTML = `
            <td style="font-weight: 600; font-family: var(--font-mono);">Week ${game.week}</td>
            <td class="game-date" title="${fullDateTime}" style="color: var(--fg2); white-space: nowrap; font-size: 0.9em;">${formattedDate}</td>
            <td><a href="team.html?id=${winner.id}" style="color: var(--accent); text-decoration: none; font-weight: 600;">${winner.name}</a></td>
            <td style="font-weight: 700; color: var(--pos); font-family: var(--font-mono);">${winnerScore}-${loserScore}</td>
            <td><a href="team.html?id=${loser.id}" style="color: var(--fg2); text-decoration: none;">${loser.name}</a></td>
            <td style="color: var(--fg2);">${location}</td>
            <td style="color: var(--accent); font-weight: 600; font-family: var(--font-mono);">+${eloChange.toFixed(2)}</td>
          `;
        } else {
          // Future/scheduled game - display matchup
          const homeTeam = teams[game.home_team_id];
          const awayTeam = teams[game.away_team_id];

          // Skip if teams not found
          if (!homeTeam || !awayTeam) return;

          const location = game.is_neutral_site ? 'Neutral Site' : homeTeam.name;

          // Format game date
          const formattedDate = formatGameDate(game.game_date);
          const fullDateTime = getFullDateTime(game.game_date);

          row.classList.add('game-scheduled');
          row.innerHTML = `
            <td style="font-weight: 600; font-family: var(--font-mono);">Week ${game.week}</td>
            <td class="game-date" title="${fullDateTime}" style="color: var(--fg2); white-space: nowrap; font-size: 0.9em; font-style: italic;">${formattedDate}</td>
            <td><a href="team.html?id=${awayTeam.id}" style="color: var(--fg2); text-decoration: none;">${awayTeam.name}</a></td>
            <td style="font-style: italic; color: var(--fg3);">vs</td>
            <td><a href="team.html?id=${homeTeam.id}" style="color: var(--fg2); text-decoration: none;">${homeTeam.name}</a></td>
            <td style="color: var(--fg3); font-style: italic;">${location}</td>
            <td style="color: var(--fg3); font-style: italic; font-family: var(--font-mono);">TBD</td>
          `;
        }

        tbody.appendChild(row);
      });
    }
  </script>
</body>
</html>
