<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Stat-urday">
  <meta property="og:title" content="All Teams — Stat-urday">
  <meta property="og:description" content="Browse all FBS college football teams and their current ELO ratings, records, and strength of schedule.">
  <meta property="og:url" content="https://cfb.bdailey.com/teams.html">
  <meta property="og:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="All Teams — Stat-urday">
  <meta name="twitter:description" content="Browse all FBS college football teams and their current ELO ratings, records, and strength of schedule.">
  <meta name="twitter:image" content="https://cfb.bdailey.com/images/og-default.svg">
  <!-- Canonical -->
  <link rel="canonical" href="https://cfb.bdailey.com/teams.html">
  <title>All Teams - College Football Rankings</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" width="28" height="28" fill="var(--accent)"><ellipse cx="12" cy="12" rx="10" ry="6.5" transform="rotate(-30 12 12)"/></svg>
        <span class="brand-name">Stat-urday</span>
        <span class="brand-sub">College Football Analytics</span>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" onclick="document.getElementById('site-nav').classList.toggle('nav-open')">☰</button>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Rankings</a>
        <a href="teams.html" class="nav-link active">All Teams</a>
        <a href="games.html" class="nav-link">Games</a>
        <a href="comparison.html" class="nav-link">Prediction Comparison</a>
        <a href="elo-formula.html" class="nav-link">How It Works</a>
        <a href="simulator.html" class="nav-link">Simulator</a>
        <a href="matchup.html" class="nav-link">Matchup</a>
      </div>
      <div class="nav-season-wrap">
        <select id="nav-season-select" class="nav-season-select" aria-label="Season"></select>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">All Teams</h2>
        <div class="filters">
          <input
            type="search"
            class="teams-search"
            id="teams-search"
            placeholder="Search teams..."
            autocomplete="off"
          >
          <button class="filter-btn active" data-conf="all">All</button>
          <button class="filter-btn" data-conf="p4">Power 4</button>
          <button class="filter-btn" data-conf="g5">Group of 5</button>
          <button class="filter-btn" data-conf="fcs">FCS</button>
          <select class="filter-select" id="sort-select">
            <option value="elo">ELO</option>
            <option value="alpha">Alphabetical</option>
            <option value="record">Record</option>
          </select>
        </div>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>Loading teams...</span>
      </div>

      <div id="teams-container" class="hidden">
        <div class="teams-grid" id="teams-grid"></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 Stat-urday</p>
      <p><a href="elo-formula.html">How It Works</a> | <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/season.js"></script>
  <script>
    let allTeams = [];
    let activeConference = 'all';
    let activeSort = 'elo';
    let searchQuery = '';

    // ── Initials Avatar (copied from team.js) ──────────────────
    function initialsAvatar(name) {
      const words = name.split(' ').filter(Boolean);
      const initials = words.length >= 2
        ? words[0][0] + words[words.length - 1][0]
        : name.substring(0, 2);
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      const hue = Math.abs(hash) % 360;
      return `<div class="team-logo-initials" style="background:hsl(${hue},55%,35%)">${initials.toUpperCase()}</div>`;
    }

    // ── Conference badge class helper ──────────────────────────
    function confBadgeClass(conf) {
      if (!conf) return '';
      const c = conf.toUpperCase();
      if (c === 'P5') return 'p5';
      if (c === 'G5') return 'g5';
      if (c === 'FCS') return 'fcs';
      return '';
    }

    // ── SOS dot helper ─────────────────────────────────────────
    function sosDot(sos) {
      if (sos == null) return '';
      if (sos >= 0.7)      return '<span class="sos-indicator elite"  title="Elite SOS"></span>';
      if (sos >= 0.5)      return '<span class="sos-indicator hard"   title="Hard SOS"></span>';
      if (sos >= 0.3)      return '<span class="sos-indicator average" title="Average SOS"></span>';
      return                      '<span class="sos-indicator easy"   title="Easy SOS"></span>';
    }

    // ── Render the card grid ────────────────────────────────────
    function renderGrid(teams) {
      const grid = document.getElementById('teams-grid');

      if (teams.length === 0) {
        grid.innerHTML = '<div class="teams-no-results">No teams found</div>';
        return;
      }

      grid.innerHTML = teams.map((team, idx) => {
        const id        = team.id || team.team_id;
        const name      = team.name || team.team_name || '';
        const conf      = team.conference || '';
        const confName  = team.conference_name || conf;
        const elo       = typeof team.elo_rating === 'number' ? team.elo_rating : 0;
        const wins      = team.wins ?? 0;
        const losses    = team.losses ?? 0;
        const rank      = team.rank != null ? team.rank : (idx + 1);
        const badgeClass = confBadgeClass(conf);
        const undefeated = losses === 0 && wins > 0;
        const recordClass = undefeated ? 'team-card-record undefeated' : 'team-card-record';

        const logoHtml = team.espn_id
          ? `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${team.espn_id}.png"
               width="52" height="52" alt="" class="team-card-logo-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            + `<div class="team-logo-initials" style="display:none;background:hsl(${(() => {
                let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return Math.abs(h)%360;
              })()},55%,35%)">${name.split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>`
          : initialsAvatar(name);

        return `
          <a href="team.html?id=${id}" class="team-card">
            <div class="team-card-logo">${logoHtml}</div>
            <div class="team-card-body">
              <div class="team-card-name">${name}</div>
              <div class="team-card-meta">
                <span class="conference-badge ${badgeClass}">${confName}</span>
                ${sosDot(team.sos)}
              </div>
              <div class="team-card-stats">
                <span class="team-card-elo">${elo.toFixed(0)}</span>
                <span class="${recordClass}">${wins}-${losses}</span>
              </div>
            </div>
            <div class="team-card-rank">#${rank}</div>
          </a>
        `;
      }).join('');
    }

    // ── Apply all active filters / sort and re-render ───────────
    function applyFilters() {
      let filtered = [...allTeams];

      // Conference filter
      if (activeConference === 'p4') {
        filtered = filtered.filter(t => (t.conference || '').toUpperCase() === 'P5');
      } else if (activeConference === 'g5') {
        filtered = filtered.filter(t => (t.conference || '').toUpperCase() === 'G5');
      } else if (activeConference === 'fcs') {
        filtered = filtered.filter(t => (t.conference || '').toUpperCase() === 'FCS');
      }

      // Search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        const nameKey = allTeams[0] && allTeams[0].name !== undefined ? 'name' : 'team_name';
        filtered = filtered.filter(t => (t[nameKey] || '').toLowerCase().includes(q));
      }

      // Sort
      if (activeSort === 'alpha') {
        const key = allTeams[0] && allTeams[0].name !== undefined ? 'name' : 'team_name';
        filtered.sort((a, b) => (a[key] || '').localeCompare(b[key] || ''));
      } else if (activeSort === 'record') {
        filtered.sort((a, b) => ((b.wins - b.losses) - (a.wins - a.losses)));
      } else {
        // Default: ELO desc
        filtered.sort((a, b) => b.elo_rating - a.elo_rating);
      }

      renderGrid(filtered);
    }

    // ── Load all teams from API ─────────────────────────────────
    async function loadTeams() {
      try {
        allTeams = await api.getTeams(null, 0, 500);
        applyFilters();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('teams-container').classList.remove('hidden');
      } catch (err) {
        console.error('Error loading teams:', err);
        document.getElementById('loading').innerHTML =
          '<div class="error">Failed to load teams. Please refresh the page.</div>';
      }
    }

    // ── Event wiring ────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadTeams();

      // Search input
      document.getElementById('teams-search').addEventListener('input', e => {
        searchQuery = e.target.value.trim();
        applyFilters();
      });

      // Conference filter buttons
      document.querySelectorAll('.filter-btn[data-conf]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn[data-conf]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeConference = btn.dataset.conf;
          applyFilters();
        });
      });

      // Sort select
      document.getElementById('sort-select').addEventListener('change', e => {
        activeSort = e.target.value;
        applyFilters();
      });
    });
  </script>
</body>
</html>
